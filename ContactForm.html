
<!Doctype html>
<html lang="en">
    <head>
        <!--Meta tags-->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--Seo tags-->
        <title>Contact Form</title>
        <meta name="description" content="a contact form to fill out basic personal details and contact ACME">
        <meta name="author" content="Aishwarya Malik | Blue Praying Mantis">

        <!--OG tags-->
        <meta property="og:title" content="Contact Form">
        <meta property="og:description" content="Contact form to fill personal details ">

        <!--Favicon-->
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        </head>
        <body>
            <header>
                <h2>ACME Support</h2>
                <!--Navigation Bar-->
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Help</a></li>
                    <li><a href="#">Contact</a></li>
                    </ul>
                </header>
                <section>
                    <h1>Contact us</h1>
                    <p>Send us a message and we will get back to you.</p>
                    </section>
           <form action="#" method="post">
            <!--name and email with required text and email fields-->
            <p>
            <label for="fullname">Full Name: </label>
            <input type="text" id="fullname" name="fullname" required>
            </p>
            <p>
            <lable for="email">Email: </lable>
            <input type="email" id="email" name="email" required>
            </p>
            <!--select options-->
            <p>
            <lable for="subject">Subject: </lable>
            <select id="subject" name="subject">
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
                <option value="option3">Option 3</option>
                <option value="option4">Option 4</option>
                </select>
            </p>
            <!--Message section with min length-->
            <p>
            <label for="message">Message: </label>
            <textarea name="message" rows="1" cols="30" minlength="10" required> Write a message here...</textarea>
            </p>
            <!--radio input for selecting options-->
        <fieldset>
            <!--with legend-->
            <legend>How did you hear about us?</legend>
            <input type="radio" id="search" name="method" value="Search">
            <label for="search">Search</label><br>
            <input type="radio" id="friend" name="method" value="Friend">
            <label for="friend">Friend</label><br>
            <input type="radio" id="social-media" name="method" value="Social Media">
            <label for="social-media">Social Media</label><br>
        </fieldset>
        <!--checkbox input type-->
        <input type="checkbox" id="updates" name="updates">
        <label for="updates">Send me product updates.</label><br>
        <br>
        <!--button type for submitting-->
        <button type="submit">Send message</button>
            </form>
            <br>
            <footer>
                &copy; 2026 Acme Support
                </footer>

            </body>
            </html>
